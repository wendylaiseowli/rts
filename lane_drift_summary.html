<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="refresh" content="2" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lane Drift Summary</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111827;
      --line: #243041;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #172033 0, var(--bg) 50%);
      color: var(--text);
      padding: 32px;
    }
    .card {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }
    p {
      margin: 0 0 20px 0;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
    }
    th {
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Human vs Bot Scheduling Drift</h1>
    <p>Human edits should show lower drift because the worker prioritizes them over bot edits.</p>
    <table>
      <thead>
        <tr>
          <th>Lane</th>
          <th>Packets</th>
          <th>Avg Drift (ns)</th>
          <th>Max Drift (ns)</th>
          <th>Min Drift (ns)</th>
          <th>Deadline Misses</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Human</td><td>8585</td><td>-1966921</td><td>2288200</td><td>-1988800</td><td style="color:#22c55e">1</td></tr><tr><td>Bot</td><td>1015</td><td>-1967638</td><td>0</td><td>-1987800</td><td style="color:#60a5fa">0</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
